      </div>
      <div class="card fade-in" style="animation-delay:0.2s" id="health-card" data-testid="db-health-card">
        <div class="card-title">Database Health</div>
        <div class="stat-grid" id="health-grid"></div>
      </div>`;

    this.querySelector('#range-switcher').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-range]');
      if (!btn) return;
      this._range = btn.dataset.range;
      this.querySelectorAll('#range-switcher button').forEach(b => {
        b.classList.toggle('active', b === btn);
      });
      this._fetchRanged();
    });

    this._fetchAll();
  }

  async _fetchAll() {
    await Promise.all([
      this._fetchRanged(),
      this._fetchHeatmap(),
      this._fetchHealth(),
    ]);
  }

  _updateRangedTitles() {
    const r = this._range;
    this.querySelector('#timeline-title').textContent = `Queries (last ${r})`;
    this.querySelector('#rate-trend-title').innerHTML = `Block &amp; Cache rate (last ${r})`;
    this.querySelector('#ranged-domains-title').textContent = `Top Domains (last ${r})`;
    this.querySelector('#ranged-clients-title').textContent = `Top Sources (last ${r})`;
  }

  async _fetchRanged() {
    this._updateRangedTitles();
    try {
      // Pass the browser's east-positive UTC offset (minutes) so the server
      // aligns timeline buckets to the viewer's local calendar (local midnight
      // / hour), not UTC-epoch boundaries. getTimezoneOffset() is UTC-minus-local.
      const tzOffset = -new Date().getTimezoneOffset();
      const [timeline, breakdown, highlights, topDomains, topClients] = await Promise.all([
        api.get(`/api/stats/v2/timeline?range=${this._range}&tz_offset=${tzOffset}`),
        api.get(`/api/stats/v2/breakdown?range=${this._range}`),
        api.get(`/api/stats/v2/highlights?range=${this._range}`),
        api.get(`/api/stats/v2/top-domains?range=${this._range}`),
        api.get(`/api/stats/v2/top-clients?range=${this._range}`),
      ]);
      this._renderTimeline(timeline);
      this._renderBreakdown(breakdown);
      this._renderRateTrend(timeline);
      this._renderHighlights(highlights);
      this._renderRangedTopDomains(topDomains);
      this._renderRangedTopClients(topClients);
    } catch (e) { console.error(e); }
  }

  async _fetchHeatmap() {
    try {
      const data = await api.get('/api/stats/v2/heatmap');
      this._renderHeatmap(data);
    } catch (e) { console.error(e); }
  }

  async _fetchHealth() {
    try {
      const data = await api.get('/api/stats/v2/health');
      this._renderHealth(data);
    } catch (e) { console.error(e); }
  }

  _formatBytes(bytes) {
    if (bytes == null) return '—';
    if (bytes >= 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  _renderTimeline(rawData) {
    const el = this.querySelector('#timeline-chart');
    if (!rawData || !rawData.length) {
      el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">No data yet</p>';
      return;
    }
    // x-axis labels stay date-only; tooltips add HH:mm on sub-day buckets.
    const subDay = this._range !== '90d';
    const fmtDay = (d) => esc(new Date(d.timestamp * 1000).toLocaleDateString([], { month: 'short', day: 'numeric' }));
    renderTimelineChart(el, rawData, [
      { key: 'total', color: 'var(--accent)', label: 'total' },
      { key: 'cached', color: 'var(--orange)', label: 'cached' },
      { key: 'blocked', color: 'var(--red)', label: 'blocked' },
    ],
    fmtDay,
    (d) => {
      const blocked = d.blocked || 0;
      const cached = d.cached || 0;
      const blockedPct = formatPct(blocked, d.total);
      const cachedPct = formatPct(cached, d.total);
      const blockedStr = blockedPct ? `${formatFull(blocked)} blocked (${blockedPct})` : `${formatFull(blocked)} blocked`;
      const cachedStr = cachedPct ? `${formatFull(cached)} cached (${cachedPct})` : `${formatFull(cached)} cached`;
      return `${esc(fmtBucketLabel(d.timestamp, subDay))}<br><span style="color:var(--accent)">${formatFull(d.total)} total</span> · <span style="color:var(--red)">${blockedStr}</span> · <span style="color:var(--orange)">${cachedStr}</span>`;
    });
  }

  _renderHeatmap(rawData) {
    const el = this.querySelector('#heatmap-container');
    // Build a [weekday][hour] lookup. API: 0=Sun..6=Sat
    // Display order: Mon(1)..Sun(0) — reorder so Mon is row 0
    const displayOrder = [1, 2, 3, 4, 5, 6, 0]; // Mon..Sun
    const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    const grid = {};
    if (rawData && rawData.length) {
      for (const d of rawData) {
        if (!grid[d.weekday]) grid[d.weekday] = {};
        grid[d.weekday][d.hour] = d.count;
      }
    }

    const allCounts = rawData && rawData.length ? rawData.map(d => d.count) : [0];
    const maxCount = Math.max(...allCounts, 1);

    if (!rawData || !rawData.length) {
      el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">No data yet</p>';
      return;
    }

    // Column labels row
    let html = '<div class="heatmap-wrap"><div class="heatmap-col-labels"><div></div>';
    for (let h = 0; h < 24; h++) {
      const label = (h === 0 || h === 6 || h === 12 || h === 18) ? String(h).padStart(2, '0') : '';
      html += `<div class="heatmap-col-label">${label}</div>`;
    }
    html += '</div>';

    // Data rows
    html += '<div class="heatmap-table">';
    for (let ri = 0; ri < 7; ri++) {
      const wd = displayOrder[ri];
      html += `<div class="heatmap-row-label">${dayLabels[ri]}</div>`;
      for (let h = 0; h < 24; h++) {
        const count = (grid[wd] && grid[wd][h]) ? grid[wd][h] : 0;
        const opacity = count > 0 ? Math.max(0.08, count / maxCount) : 0.04;
        const dayName = dayLabels[ri];
        const edgeCls = [];
        if (ri === 0) edgeCls.push('edge-top');
        if (h <= 2) edgeCls.push('edge-left');
        if (h >= 21) edgeCls.push('edge-right');
        html += `<div class="heatmap-cell${edgeCls.length ? ' ' + edgeCls.join(' ') : ''}" style="--cell-op:${opacity.toFixed(3)}" title="${formatFull(count)} queries · ${dayName} ${String(h).padStart(2,'0')}:00">
          <span class="heatmap-tooltip">${formatFull(count)} · ${dayName} ${String(h).padStart(2,'0')}:00</span>
        </div>`;
      }
    }
    html += '</div></div>';
    el.innerHTML = html;

    // Touch: CSS :hover never fires on mobile, so tap a cell to show its tooltip,
    // tap another to switch, tap outside to dismiss. The listener lives on the
    // freshly-built .heatmap-wrap (GC'd with the next re-render — no accumulation).
    const wrap = el.querySelector('.heatmap-wrap');
    const clearActive = () => { _chartTouchDismissers.delete(el); wrap.querySelectorAll('.heatmap-cell.touch-active').forEach(c => c.classList.remove('touch-active')); };
    wrap.addEventListener('pointerup', (evt) => {
      if (evt.pointerType === 'mouse') return; // mouse keeps pure hover behavior
      const cell = evt.target.closest('.heatmap-cell');
      if (!cell) return;
      const wasActive = cell.classList.contains('touch-active');
      clearActive();
      if (!wasActive) { cell.classList.add('touch-active'); _chartTouchDismissers.set(el, clearActive); }
    });
  }

  _renderBarChart(containerId, entries, color) {
    const el = this.querySelector(containerId);
    if (!entries || !entries.length) {
      el.innerHTML = '<p style="color:var(--text-dim)">No data yet</p>';
      return;
    }
    const sorted = [...entries].sort((a, b) => b[1] - a[1]);
    const maxVal = Math.max(...sorted.map(e => e[1]), 1);
    const sumVal = sorted.reduce((a, e) => a + e[1], 0);
    const barThreshold = window.innerWidth <= 768 ? 100_000 : 1_000_000;
    let html = '<div class="bar-list">';
    for (const [label, count] of sorted) {
      const barPct = (count / maxVal * 100).toFixed(1);
      const sharePct = formatPct(count, sumVal);
      const titleText = sharePct ? `${formatFull(count)} (${sharePct})` : formatFull(count);
      const pctLine = sharePct ? `<div class="bar-row-pct">${sharePct}</div>` : '';
      html += `<div class="bar-row">
        <div class="bar-row-label" title="${esc(label)}">${esc(label)}</div>
        <div class="bar-row-track"><div class="bar-row-fill" style="width:${barPct}%;background:${color}"></div></div>
        <div class="bar-row-count" title="${titleText}"><div>${formatNumAdaptive(count, barThreshold)}</div>${pctLine}</div>
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  }

  _renderBreakdown(data) {
    if (!data) return;
    this._renderBarChart('#qtypes-chart', data.query_types, 'var(--accent)');
    this._renderBarChart('#outcomes-chart', data.outcomes, 'var(--orange)');
  }

  _renderHealth(data) {
    const el = this.querySelector('#health-grid');
    if (!data) { el.innerHTML = '<p style="color:var(--text-dim)">No data</p>'; return; }
    const oldest = data.oldest_log_timestamp
      ? new Date(data.oldest_log_timestamp * 1000).toLocaleDateString()
      : '—';
    const retention = data.log_retention_days != null ? `${data.log_retention_days}d` : '—';
    const avgDay = data.avg_new_rows_per_day != null ? formatNum(Math.round(data.avg_new_rows_per_day)) : '—';
    const fragPct = data.fragmentation_ratio != null ? Math.round(data.fragmentation_ratio * 100) : 0;
    const bytesPerLog = data.bytes_per_log ? this._formatBytes(Math.round(data.bytes_per_log)) : '—';
    const growthPerDay = data.bytes_per_log && data.avg_new_rows_per_day
      ? this._formatBytes(Math.round(data.bytes_per_log * data.avg_new_rows_per_day))
      : '—';
    const cov = data.log_coverage_days || 0;
    const coverage = cov > 0 ? `${cov >= 10 ? Math.round(cov) : cov.toFixed(1)}d` : '—';
    const projected = data.projected_full_bytes ? this._formatBytes(data.projected_full_bytes) : '—';
    el.innerHTML = `
      <div class="stat-card"><div class="stat-label">Database Size</div><div class="stat-value accent" style="font-size:1.4rem">${this._formatBytes(data.db_size_bytes)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Logs</div><div class="stat-value accent" style="font-size:1.4rem" title="${formatFull(data.total_log_count)}">${formatNumAdaptive(data.total_log_count, 10_000_000)}</div></div>
      <div class="stat-card"><div class="stat-label">Bytes / Log</div><div class="stat-value accent" style="font-size:1.4rem">${bytesPerLog}</div></div>
      <div class="stat-card"><div class="stat-label">Reclaimable</div><div class="stat-value accent" style="font-size:1.4rem">${this._formatBytes(data.reclaimable_bytes || 0)}</div><div class="stat-sub">${fragPct}% of file</div></div>
      <div class="stat-card"><div class="stat-label">Oldest Log</div><div class="stat-value" style="font-size:1.1rem;color:var(--text-secondary)">${esc(oldest)}</div></div>
      <div class="stat-card"><div class="stat-label">Log Coverage</div><div class="stat-value accent" style="font-size:1.4rem">${coverage}</div></div>
      <div class="stat-card"><div class="stat-label">Retention</div><div class="stat-value accent" style="font-size:1.4rem">${esc(retention)}</div></div>
      <div class="stat-card"><div class="stat-label">Avg / Day</div><div class="stat-value accent" style="font-size:1.4rem">${esc(avgDay)}</div></div>
      <div class="stat-card"><div class="stat-label">Growth / Day</div><div class="stat-value accent" style="font-size:1.4rem">${growthPerDay}</div></div>
      <div class="stat-card"><div class="stat-label">Projected Full</div><div class="stat-value accent" style="font-size:1.4rem">${projected}</div><div class="stat-sub">at full retention</div></div>`;
  }

  _renderHighlights(data) {
    const el = this.querySelector('#highlights-grid');
    if (!data) { el.innerHTML = ''; return; }
    const lat = data.latency || {};
    const sample = lat.sample_count || 0;
    const hasLat = sample > 0;
    const fmtMs = (ms) => hasLat ? `${formatNum(ms)}<span style="font-size:0.9rem;color:var(--text-dim)">ms</span>` : '—';
    el.innerHTML = `
      <div class="stat-card"><div class="stat-label">Unique Domains</div><div class="stat-value accent" style="font-size:1.6rem" title="${formatFull(data.unique_domains)}">${formatNumAdaptive(data.unique_domains, 10_000_000)}</div></div>
      <div class="stat-card"><div class="stat-label">Latency p50</div><div class="stat-value" style="font-size:1.6rem;color:var(--green)">${fmtMs(lat.p50_ms)}</div></div>
      <div class="stat-card"><div class="stat-label">Latency p95</div><div class="stat-value" style="font-size:1.6rem;color:var(--orange)">${fmtMs(lat.p95_ms)}</div></div>
      <div class="stat-card"><div class="stat-label">Latency p99</div><div class="stat-value" style="font-size:1.6rem;color:var(--red)">${fmtMs(lat.p99_ms)}</div></div>`;
  }

  _renderRangedTopDomains(rows) {
    this._renderBarChart('#ranged-domains', (rows || []).map(d => [d.domain, d.count]), 'var(--accent)');
  }

  _renderRangedTopClients(rows) {
    const entries = (rows || []).map(d => {
      const label = d.doh_token ? `${d.client_ip} · ${d.doh_token}` : d.client_ip;
      return [label, d.count];
    });
    this._renderBarChart('#ranged-clients', entries, 'var(--green)');
  }

  _renderRateTrend(rawData) {
    const el = this.querySelector('#rate-trend-chart');
    if (!rawData || !rawData.length) {
      el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">No data yet</p>';
      return;
    }
    rawData = downsampleBuckets(rawData, MAX_BARS_GROUPED());
    const len = rawData.length;
    const w = 600;
    const h = 140;
    const padX = 8;
    const padY = 12;
    const innerW = w - padX * 2;
    const innerH = h - padY * 2;
    const baseline = padY + innerH;
    const hOf = (pct) => (pct / 100) * innerH; // percentage → bar height
    const slot = innerW / len;
    // Two grouped bars per bucket (block %, cache %) sitting side by side.
    const group = Math.min(slot * 0.7, 44);
    const bw = group / 2;
    const cats = [
      { key: 'blocked', color: 'var(--red)' },
      { key: 'cached', color: 'var(--green)' },
    ];
    const bars = [];
    let rects = '';
    for (let i = 0; i < len; i++) {
      const d = rawData[i];
      const total = d.total || 0;
      const blockedPct = total > 0 ? ((d.blocked || 0) / total) * 100 : 0;
      const cachedPct = total > 0 ? ((d.cached || 0) / total) * 100 : 0;
      const pcts = { blocked: blockedPct, cached: cachedPct };
      const cx = padX + (i + 0.5) * slot;
      const left = cx - group / 2;
      cats.forEach((c, gi) => {
        const hgt = hOf(pcts[c.key]);
        if (hgt > 0.3) rects += `<rect class="ratebar" data-i="${i}" x="${(left + gi * bw).toFixed(1)}" y="${(baseline - hgt).toFixed(1)}" width="${(bw * 0.86).toFixed(1)}" height="${hgt.toFixed(1)}" fill="${c.color}" fill-opacity="0.85"/>`;
      });
      bars.push({ i, cx, topY: baseline - hOf(Math.max(blockedPct, cachedPct)), d, blockedPct, cachedPct });
    }
    // Gridlines stay inside the stretched SVG (geometry should stretch). The
    // numeric % labels are real HTML in a .rate-yticks overlay so they are
    // never distorted by preserveAspectRatio="none" (same fix as .tl-yticks).
    const ticks = [25, 50, 75].map(p => {
      const y = (baseline - hOf(p)).toFixed(1);
      return `<line x1="${padX}" y1="${y}" x2="${padX + innerW}" y2="${y}" stroke="var(--border)" stroke-dasharray="2 4" stroke-width="0.5"/>`;
    }).join('');
    const yTicks = '<div class="rate-yticks" aria-hidden="true">' +
      [25, 50, 75].map(p =>
        `<span class="tl-ytick" style="top:${(((baseline - hOf(p)) / h) * 100).toFixed(2)}%">${p}%</span>`
      ).join('') + '</div>';
    // x-axis labels stay date-only; tooltips add HH:mm on sub-day buckets.
    const subDay = this._range !== '90d';
    const fmtDay = (d) => esc(new Date(d.timestamp * 1000).toLocaleDateString([], { month: 'short', day: 'numeric' }));
    const targetLabels = window.innerWidth <= 480 ? 4 : 6;
    const labelEvery = Math.max(1, Math.round(len / targetLabels));
    let labels = '<div class="chart-labels">';
    for (let i = 0; i < len; i += labelEvery) labels += `<div class="chart-label">${fmtDay(rawData[i])}</div>`;
    labels += '</div>';
    el.innerHTML = `
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" class="rate-svg">
        ${ticks}
        ${rects}
      </svg>
      ${yTicks}
      <div class="rate-tooltip"></div>
      ${labels}
      <div class="rate-legend">
        <span><i style="background:var(--red)"></i>blocked %</span>
        <span><i style="background:var(--green)"></i>cached %</span>
      </div>`;

    const svg = el.querySelector('.rate-svg');
    const tooltip = el.querySelector('.rate-tooltip');
    let hlIdx = -1;
    const highlight = (i) => {
      if (i === hlIdx) return;
      if (hlIdx !== -1) svg.querySelectorAll(`.ratebar[data-i="${hlIdx}"]`).forEach(r => r.classList.remove('hl'));
      if (i !== -1) svg.querySelectorAll(`.ratebar[data-i="${i}"]`).forEach(r => r.classList.add('hl'));
      hlIdx = i;
    };
    const onMove = (evt) => {
      const rect = svg.getBoundingClientRect();
      if (rect.width === 0) return;
      const svgX = ((evt.clientX - rect.left) / rect.width) * w;
      let best = bars[0];
      for (const b of bars) if (Math.abs(b.cx - svgX) < Math.abs(best.cx - svgX)) best = b;
      svg.classList.add('cursoring');
      highlight(best.i);
      tooltip.innerHTML = `${esc(fmtBucketLabel(best.d.timestamp, subDay))}<br><span style="color:var(--red)">${best.blockedPct.toFixed(1)}% blocked</span> · <span style="color:var(--green)">${best.cachedPct.toFixed(1)}% cached</span><br><span style="color:var(--text-dim)">${formatFull(best.d.total || 0)} total</span>`;
      tooltip.classList.add('active'); // display:block first so offsetWidth is measurable
      const pxX = (best.cx / w) * rect.width;
      const containerRect = el.getBoundingClientRect();
      const pxY = (rect.top - containerRect.top) + (best.topY / h) * rect.height;
      // Tooltip is centered on `left` via translate(-50%); clamp so it never
      // spills past the container (the .card has overflow:hidden and clips it).
      const half = tooltip.offsetWidth / 2;
      tooltip.style.left = `${Math.max(half, Math.min(pxX, el.clientWidth - half))}px`;
      tooltip.style.top = `${pxY}px`;
    };
    const onLeave = () => { svg.classList.remove('cursoring'); highlight(-1); tooltip.classList.remove('active'); };
    addChartTouch(svg, el, onMove, onLeave);
  }
}
customElements.define('stats-page', StatsPage);

// --- Query Log Page ---
class LogsPage extends HTMLElement {
  constructor() {
    super();
    this.offset = 0;
    this.limit = 50;
    this.search = '';
    this.actionFilter = '';
    this.tokenFilter = '';
    this.typeFilter = '';
  }

  connectedCallback() {
    this.innerHTML = `
      <div class="page-header fade-in"><h2>Query Log</h2><p>DNS query history</p></div>
      <div class="filters-row fade-in">
        <input type="text" id="log-search" placeholder="Domain prefix, or *pattern*" title="Plain text matches the domain prefix (fast). Use * or % anywhere for a substring/wildcard match (slower).">
        <select id="log-action">
          <option value="">All</option>
          <option value="allowed">Allowed</option>
          <option value="blocked">Blocked</option>
        </select>
        <select id="log-type">
          <option value="">All Types</option>
          <option value="A">A</option>
          <option value="AAAA">AAAA</option>
          <option value="CNAME">CNAME</option>
          <option value="MX">MX</option>
          <option value="TXT">TXT</option>
          <option value="NS">NS</option>
          <option value="SOA">SOA</option>
          <option value="PTR">PTR</option>
          <option value="SRV">SRV</option>
          <option value="CAA">CAA</option>
          <option value="HTTPS">HTTPS</option>
        </select>
        <select id="log-token">
          <option value="">All Tokens</option>
        </select>
        <button class="btn btn-danger btn-sm" id="clear-logs">${icons.trash} Clear All</button>
      </div>
      <div class="card fade-in" style="animation-delay:0.05s">
        <div class="table-wrap hide-mobile-block"><table><thead><tr>
          <th>Time</th><th>Status</th><th>Query</th><th>Type</th><th>Client</th><th></th><th>Source</th><th>ms</th>
        </tr></thead><tbody id="log-body"></tbody></table></div>
        <div id="log-cards" class="show-mobile"></div>
        <div class="pagination" id="log-pagination"></div>
      </div>`;

    let debounce;
    this.querySelector('#log-search').oninput = (e) => {
      clearTimeout(debounce);
      debounce = setTimeout(() => { this.search = e.target.value; this.offset = 0; this.load(); }, 300);
    };
    this.querySelector('#log-action').onchange = (e) => {
      this.actionFilter = e.target.value; this.offset = 0; this.load();
    };
    this.querySelector('#log-token').onchange = (e) => {
      this.tokenFilter = e.target.value; this.offset = 0; this.load();
    };
    this.querySelector('#log-type').onchange = (e) => {
      this.typeFilter = e.target.value; this.offset = 0; this.load();
    };
    this.loadTokens();
    this.querySelector('#clear-logs').onclick = async () => {
      if (confirm('Delete all query logs?')) {
        await api.del('/api/logs');
        this.load();
      }
    };
    this.load();
  }

  async load() {
    try {
      let url = `/api/logs?limit=${this.limit}&offset=${this.offset}`;
      if (this.search) url += `&search=${encodeURIComponent(this.search)}`;
      if (this.actionFilter) url += `&blocked=${this.actionFilter === 'blocked'}`;
      if (this.tokenFilter) url += `&token=${encodeURIComponent(this.tokenFilter)}`;
      if (this.typeFilter) url += `&query_type=${encodeURIComponent(this.typeFilter)}`;
      const data = await api.get(url);
      this.total = data.total || 0;
      this.renderLogs(data.logs || []);
    } catch (e) { console.error(e); }
  }

  renderLogs(logs) {
    const noFilters = !this.search && !this.actionFilter && !this.tokenFilter && !this.typeFilter;
    const emptyGuide = `<div style="text-align:center;color:var(--text-secondary);padding:24px 12px">
        <div style="color:var(--text-primary);font-weight:600;margin-bottom:6px">No DNS queries logged yet</div>
        <div style="font-size:0.9rem">Once a device uses noadd as its DNS resolver, its queries will appear here.</div>
      </div>`;
    const emptyGuideDesktop = `<div data-testid="logs-empty-state" style="text-align:center;color:var(--text-secondary);padding:24px 12px">
        <div style="color:var(--text-primary);font-weight:600;margin-bottom:6px">No DNS queries logged yet</div>
        <div style="font-size:0.9rem">Once a device uses noadd as its DNS resolver, its queries will appear here.</div>
      </div>`;
    // Desktop table
    const body = this.querySelector('#log-body');
    if (!logs.length) {
      body.innerHTML = noFilters
        ? `<tr><td colspan="8" style="padding:0">${emptyGuideDesktop}</td></tr>`
        : '<tr><td colspan="8" style="text-align:center;color:var(--text-dim)">No logs found</td></tr>';
    } else {
      body.innerHTML = logs.map(l => `<tr>
        <td>${timeAgo(l.timestamp)}</td>
        <td style="text-align:center"><span class="st ${l.blocked ? 'st-block' : 'st-ok'}" title="${l.blocked ? 'blocked' : 'allowed'}">${l.blocked ? '✖' : '✔'}</span></td>
        <td><div style="display:flex;align-items:center;gap:6px;max-width:300px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;color:var(--text-primary)" title="${esc(l.domain)}">${esc(l.domain)}</span>${l.authenticated_data ? '<span class="badge badge-dnssec" style="flex:0 0 auto">dnssec</span>' : ''}</div>${l.result ? '<div class="mono" style="font-size:0.85rem;color:var(--text-dim);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(l.result) + '">→ ' + esc(l.result) + '</div>' : ''}</td>
        <td class="mono">${esc(l.query_type)}</td>
        <td class="mono">${esc(l.client_ip)}${l.doh_token ? '<br><span style="color:var(--accent);font-size:0.85rem">' + esc(l.doh_token) + '</span>' : ''}</td>
        <td><button class="btn btn-sm log-action ${l.blocked ? 'btn-allow' : 'btn-danger'}" data-domain="${esc(l.domain)}" data-blocked="${l.blocked}">${l.blocked ? 'Allow' : 'Block'}</button></td>
        <td>${l.cached ? '<span class="badge badge-cached">cached</span>' : l.upstream ? '<span class="mono" style="font-size:0.9rem">' + esc(l.upstream) + '</span>' : '<span style="color:var(--text-dim)">-</span>'}</td>
        <td class="mono">${l.response_ms}</td>
      </tr>`).join('');
    }

    // Mobile card list
    const cards = this.querySelector('#log-cards');
    if (!logs.length) {
      cards.innerHTML = noFilters
        ? emptyGuide
        : '<p style="color:var(--text-dim);text-align:center;padding:16px">No logs found</p>';
    } else {
      cards.innerHTML = logs.map(l => `<div class="log-card">
        <div class="log-card-row1">
          <span class="st ${l.blocked ? 'st-block' : 'st-ok'}" title="${l.blocked ? 'blocked' : 'allowed'}" style="flex:0 0 auto">${l.blocked ? '✖' : '✔'}</span>
          <span class="log-card-domain" title="${esc(l.domain)}">${esc(l.domain)}</span>
          ${l.authenticated_data ? '<span class="badge badge-dnssec" style="flex:0 0 auto">dnssec</span>' : ''}
          <button class="btn btn-sm log-action ${l.blocked ? 'btn-allow' : 'btn-danger'}" data-domain="${esc(l.domain)}" data-blocked="${l.blocked}" style="flex-shrink:0">${l.blocked ? 'Allow' : 'Block'}</button>
        </div>
        ${l.result ? '<div class="mono" style="font-size:0.85rem;color:var(--text-dim);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(l.result) + '">→ ' + esc(l.result) + '</div>' : ''}
        <div class="log-card-row2">
          <span class="lc-time">${timeAgo(l.timestamp)}</span>
          <span class="lc-type">${esc(l.query_type)}</span>
          <span class="lc-client" style="color:var(--text-secondary)">${esc(l.client_ip)}</span>
          ${l.cached ? '<span class="lc-cached">cached</span>' : l.upstream ? '<span class="lc-up">' + esc(l.upstream) + '</span>' : ''}
          ${l.doh_token ? '<span class="lc-token">' + esc(l.doh_token) + '</span>' : ''}
          <span class="lc-ms">${l.response_ms}ms</span>
        </div>
      </div>`).join('');
    }

    // Bind action buttons (both table and cards)
    this.querySelectorAll('.log-action').forEach(btn => {
      btn.onclick = async () => {
        const domain = btn.dataset.domain;
        const rule = btn.dataset.blocked === 'true' ? `@@||${domain}^` : `||${domain}^`;
        await api.post('/api/rules', { rule });
        btn.textContent = 'Done';
        btn.disabled = true;
      };
    });

    const pag = this.querySelector('#log-pagination');
    const currentPage = Math.floor(this.offset / this.limit) + 1;
    const totalPages = Math.max(1, Math.ceil(this.total / this.limit));
    const hasPrev = this.offset > 0;
    const hasNext = currentPage < totalPages;
    pag.innerHTML = `
      <button class="btn btn-sm" ${hasPrev ? '' : 'disabled'} id="pg-prev">Prev</button>
      <span>Page ${currentPage} / ${totalPages}</span>
      <button class="btn btn-sm" ${hasNext ? '' : 'disabled'} id="pg-next">Next</button>`;
    pag.querySelector('#pg-prev').onclick = () => { this.offset = Math.max(0, this.offset - this.limit); this.load(); };
    pag.querySelector('#pg-next').onclick = () => { this.offset += this.limit; this.load(); };
  }
  async loadTokens() {
    try {
      const tokens = await api.get('/api/doh-tokens');
      const sel = this.querySelector('#log-token');
      for (const t of tokens) {
        const opt = document.createElement('option');
        opt.value = t.token;
        opt.textContent = t.token;
        sel.appendChild(opt);
      }
    } catch (e) { console.error(e); }
  }
}
customElements.define('logs-page', LogsPage);

// --- Filters Page (merged Lists + Rules + Domain Test) ---
class FiltersPage extends HTMLElement {
  connectedCallback() {
    this.innerHTML = `
      <div class="page-header fade-in"><h2>Filters</h2><p>Domain test, filter lists, and custom rules</p></div>
      <div class="card fade-in">
        <div class="card-title">Domain Test</div>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px">Check whether a domain is allowed or blocked by your current filters.</p>
        <div class="input-row">
          <input type="text" id="test-domain" data-testid="domain-test-input" placeholder="ads.example.com">
          <button class="btn btn-primary btn-sm" id="test-btn" data-testid="domain-test-submit">${icons.refresh} Test</button>
        </div>
        <div id="test-result" data-testid="domain-test-result" style="margin-top:12px"></div>
      </div>
      <div class="card fade-in" style="animation-delay:0.05s">
        <div class="card-title">Filter Lists</div>
        <div data-testid="filters-all-disabled-warning" style="display:none;margin-bottom:12px;padding:12px;border-radius:8px;background:var(--bg-secondary);border:1px solid var(--red)">
          <div style="color:var(--text-primary);font-weight:600;margin-bottom:4px">No filter list is enabled</div>
          <div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:8px">Every filter list is turned off, so noadd is not blocking anything. Enable a recommended list to start filtering.</div>
          <button class="btn btn-primary btn-sm" data-testid="filters-enable-recommended" id="enable-recommended">Enable AdGuard DNS filter</button>
        </div>
        <div class="filters-row" style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" id="update-all">${icons.refresh} Update All</button>
          <button class="btn btn-sm" id="browse-registry">${icons.search} Browse Registry</button>
        </div>
        <div class="table-wrap hide-mobile-block"><table><thead><tr>
          <th>Enabled</th><th>Name</th><th>Rules</th><th>Updated</th><th></th>
        </tr></thead><tbody id="lists-body"></tbody></table></div>
        <div id="lists-cards" class="show-mobile"></div>
        <div class="card-title" style="margin-top:16px">Add Custom List</div>
        <div class="input-row">
          <input type="text" id="list-name" data-testid="list-name-input" placeholder="List name">
          <input type="url" id="list-url" data-testid="list-url-input" placeholder="https://...">
          <button class="btn btn-primary btn-sm" id="add-list" data-testid="list-add-submit">${icons.plus} Add</button>
        </div>
      </div>
      <div class="card fade-in" style="animation-delay:0.1s">
        <div class="card-title">Custom Rules</div>
        <div class="input-row">
          <input type="text" id="add-rule-input" data-testid="rule-input" placeholder="||ads.example.com^ or @@||safe.example.com^">
          <button class="btn btn-primary btn-sm" id="add-rule-btn" data-testid="rule-submit">${icons.plus} Add</button>
        </div>
        <div id="rules-list" data-testid="rules-list" style="margin-top:12px"></div>
        <div style="margin-top:16px;padding:12px;background:var(--bg-secondary);border-radius:8px;font-size:0.8rem;color:var(--text-dim)">
          <strong style="color:var(--text-secondary)">Syntax Reference</strong>
          <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
            <div><code style="color:var(--text-secondary);font-size:0.75rem">||ads.example.com^</code><br>Block domain and all subdomains</div>
            <div><code style="color:var(--text-secondary);font-size:0.75rem">@@||safe.example.com^</code><br>Allow domain and all subdomains</div>
            <div><code style="color:var(--text-secondary);font-size:0.75rem">example.com</code><br>Block exact domain only</div>
            <div><code style="color:var(--text-secondary);font-size:0.75rem">0.0.0.0 example.com</code><br>Block exact domain (hosts format)</div>
          </div>
        </div>
      </div>`;

    // --- Domain Test ---
    this.querySelector('#test-btn').onclick = () => this.testDomain();
    this.querySelector('#test-domain').onkeydown = (e) => { if (e.key === 'Enter') this.testDomain(); };

    // --- Filter Lists ---
    this.querySelector('#update-all').onclick = async () => {
      const btn = this.querySelector('#update-all');
      btn.disabled = true;
      btn.innerHTML = icons.refresh + ' Updating...';
      try { await api.post('/api/lists/update'); } catch (e) { console.error(e); }
      btn.disabled = false;
      btn.innerHTML = icons.refresh + ' Update All';
      this.loadLists();
    };

    this.querySelector('#add-list').onclick = async () => {
      const name = this.querySelector('#list-name').value.trim();
      const url = this.querySelector('#list-url').value.trim();
      if (!name || !url) return;
      await api.post('/api/lists', { name, url });
      this.querySelector('#list-name').value = '';
      this.querySelector('#list-url').value = '';
      this.loadLists();
    };

    this.querySelector('#browse-registry').onclick = () => {
      const modal = document.createElement('registry-modal');
      modal.addEventListener('batch-added', () => this.loadLists());
      document.body.appendChild(modal);
      modal.open();
    };

    this.querySelector('#enable-recommended').onclick = () => this.enableRecommended();

    // --- Custom Rules ---
    this.querySelector('#add-rule-btn').onclick = async () => {
      const v = this.querySelector('#add-rule-input').value.trim();
      if (!v) return;
      try {
        await api.post('/api/rules', { rule: v });
        this.querySelector('#add-rule-input').value = '';
        this.loadRules();
      } catch (e) {
        alert('Invalid rule syntax');
      }
    };
    this.querySelector('#add-rule-input').onkeydown = (e) => { if (e.key === 'Enter') this.querySelector('#add-rule-btn').click(); };

    this.loadLists();
    this.loadRules();
  }

  async testDomain() {
    const domain = this.querySelector('#test-domain').value.trim();
    if (!domain) return;
    const el = this.querySelector('#test-result');
    try {
      const res = await api.post('/api/filter/check', { domain });
      if (res.action === 'blocked') {
        el.innerHTML = `<span class="badge badge-blocked">Blocked</span>
          <span style="color:var(--text-secondary);font-size:0.85rem;margin-left:8px">
            Rule: <code style="color:var(--text-primary)">${esc(res.rule)}</code>
            &middot; List: <code style="color:var(--text-primary)">${esc(res.list)}</code>
          </span>`;
      } else {
        let detail = res.rule
          ? ` <span style="color:var(--text-secondary);font-size:0.85rem;margin-left:8px">Rule: <code style="color:var(--text-primary)">${esc(res.rule)}</code></span>`
          : '';
        el.innerHTML = '<span class="badge badge-allowed">Allowed</span>' + detail;
      }
    } catch (e) {
      el.innerHTML = '<span style="color:var(--red)">Error checking domain</span>';
    }
  }

  async loadLists() {
    try {
      const lists = await api.get('/api/lists');
      this._lists = lists;

      // Desktop table
      const body = this.querySelector('#lists-body');
      body.innerHTML = lists.map(l => `<tr data-testid="filter-list-row" data-name="${esc(l.name)}">
        <td>
          <label class="toggle">
            <input type="checkbox" data-testid="filter-list-toggle" ${l.enabled ? 'checked' : ''} data-id="${l.id}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </td>
        <td style="color:var(--text-primary)">${esc(l.name)}</td>
        <td>${formatFull(l.rule_count)}</td>
        <td>${l.last_updated ? timeAgo(l.last_updated) : 'never'}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm edit-list" data-id="${l.id}" data-name="${esc(l.name)}" data-url="${esc(l.url)}">Edit</button>
          <button class="btn btn-danger btn-sm del-list" data-id="${l.id}">${icons.trash}</button>
        </td>
      </tr>`).join('');

      // Mobile cards
      const cards = this.querySelector('#lists-cards');
      cards.innerHTML = lists.map(l => `<div class="log-card">
        <div class="log-card-row1">
          <label class="toggle">
            <input type="checkbox" ${l.enabled ? 'checked' : ''} data-id="${l.id}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span style="flex:1;color:var(--text-primary);font-size:0.85rem">${esc(l.name)}</span>
          <button class="btn btn-sm edit-list" data-id="${l.id}" data-name="${esc(l.name)}" data-url="${esc(l.url)}" style="flex-shrink:0">Edit</button>
          <button class="btn btn-danger btn-sm del-list" data-id="${l.id}" style="flex-shrink:0">${icons.trash}</button>
        </div>
        <div class="log-card-row2">
          <span>${formatNum(l.rule_count)} rules</span>
          <span>${l.last_updated ? timeAgo(l.last_updated) : 'never updated'}</span>
        </div>
      </div>`).join('');

      // Bind toggles and delete buttons (both table and cards)
      this.querySelectorAll('#lists-body input[type=checkbox], #lists-cards input[type=checkbox]').forEach(cb => {
        cb.onchange = async () => {
          await api.put(`/api/lists/${cb.dataset.id}`, { enabled: cb.checked });
          if (this._lists) {
            const l = this._lists.find((x) => String(x.id) === String(cb.dataset.id));
            if (l) l.enabled = cb.checked;
          }
          this._refreshAllDisabledWarning();
        };
      });

      this.querySelectorAll('.del-list').forEach(btn => {
        btn.onclick = async () => {
          if (confirm('Delete this list?')) {
            await api.del(`/api/lists/${btn.dataset.id}`);
            this.loadLists();
          }
        };
      });

      this.querySelectorAll('.edit-list').forEach(btn => {
        btn.onclick = () => this.showEditDialog(btn.dataset.id, btn.dataset.name, btn.dataset.url);
      });

      this._refreshAllDisabledWarning();
    } catch (e) { console.error(e); }
  }

  _refreshAllDisabledWarning() {
    const warn = this.querySelector('[data-testid="filters-all-disabled-warning"]');
    if (!warn) return;
    const lists = this._lists || [];
    const allDisabled = lists.length > 0 && lists.every((l) => !l.enabled);
    warn.style.display = allDisabled ? '' : 'none';
  }

  async enableRecommended() {
    const lists = this._lists || [];
    if (!lists.length) return;
    const pick = lists.find(l => l.name === 'AdGuard DNS filter') || lists[0];
    try {
      await api.put(`/api/lists/${pick.id}`, { enabled: true });
      await this.loadLists();
    } catch (e) { console.error(e); }
  }

  showEditDialog(id, name, url) {
    // Remove existing dialog if any
    const existing = document.querySelector('.dialog-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';
    overlay.innerHTML = `
      <div class="dialog">
        <div class="dialog-title">Edit Filter List</div>
        <label for="edit-name">Name</label>
        <input type="text" id="edit-name" value="${esc(name)}">
        <label for="edit-url">URL</label>
        <input type="url" id="edit-url" value="${esc(url)}">
        <div class="dialog-health" id="edit-health"></div>
        <div class="dialog-actions">
          <button class="btn btn-sm" id="edit-check">${icons.refresh} Check URL</button>
          <span style="flex:1"></span>
          <button class="btn btn-sm" id="edit-cancel">Cancel</button>
          <button class="btn btn-primary btn-sm" id="edit-save">Save</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    overlay.querySelector('#edit-cancel').onclick = () => overlay.remove();
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    overlay.querySelector('#edit-check').onclick = async () => {
      const checkUrl = overlay.querySelector('#edit-url').value.trim();
      const healthEl = overlay.querySelector('#edit-health');
      const btn = overlay.querySelector('#edit-check');
      btn.disabled = true;
      btn.innerHTML = icons.refresh + ' Checking...';
      try {
        const res = await api.post(`/api/lists/${id}/check`, { url: checkUrl || undefined });
        if (res.ok) {
          const size = res.content_length > 1024 ? (res.content_length / 1024).toFixed(0) + ' KB' : res.content_length + ' B';
          healthEl.innerHTML = `<span class="badge badge-allowed">OK</span> <span style="color:var(--text-secondary)">HTTP ${res.status} &middot; ${size}</span>`;
        } else {
          healthEl.innerHTML = `<span class="badge badge-blocked">FAIL</span> <span style="color:var(--text-secondary)">${esc(res.error || 'HTTP ' + res.status)}</span>`;
        }
      } catch (e) {
        healthEl.innerHTML = '<span class="badge badge-blocked">Error</span>';
      }
      btn.disabled = false;
      btn.innerHTML = icons.refresh + ' Check URL';
    };

    overlay.querySelector('#edit-save').onclick = async () => {
      const newName = overlay.querySelector('#edit-name').value.trim();
      const newUrl = overlay.querySelector('#edit-url').value.trim();
      if (!newName || !newUrl) return;
      await api.put(`/api/lists/${id}`, { name: newName, url: newUrl });
      overlay.remove();
      this.loadLists();
    };
  }

  async loadRules() {
    try {
      const rules = await api.get('/api/rules');
      const el = this.querySelector('#rules-list');
      if (!rules.length) { el.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem">No rules</p>'; return; }
      let html = '<table><tbody>';
      for (const r of rules) {
        const badge = r.rule_type === 'allow'
          ? '<span class="badge badge-allowed">allow</span>'
          : '<span class="badge badge-blocked">block</span>';
        html += `<tr data-testid="rule-row" data-rule="${esc(r.rule)}" data-type="${esc(r.rule_type)}">
          <td style="width:70px">${badge}</td>
          <td class="mono" style="color:var(--text-primary);font-size:0.85rem">${esc(r.rule)}</td>
          <td style="width:40px"><button class="btn btn-danger btn-sm del-rule" data-testid="rule-delete" data-id="${r.id}">${icons.trash}</button></td>
        </tr>`;
      }
      html += '</tbody></table>';
      el.innerHTML = html;
      el.querySelectorAll('.del-rule').forEach(btn => {
        btn.onclick = async () => {
          await api.del(`/api/rules/${btn.dataset.id}`);
          this.loadRules();
        };
      });
    } catch (e) { console.error(e); }
  }
}
customElements.define('filters-page', FiltersPage);

        <div class="input-row" style="margin-bottom:2px">
          <select id="s-block-mode">
            <option value="null_ip">Null IP (0.0.0.0 / ::)</option>
            <option value="nxdomain">NXDOMAIN</option>
            <option value="refused">REFUSED</option>
            <option value="custom_ip">Custom IP</option>
          </select>
        </div>
        <div class="field-msg" id="msg-block-mode"></div>
        <div id="s-block-custom" style="display:none">
          <div class="input-row" style="margin-bottom:2px"><input type="text" id="s-block-ipv4" placeholder="Custom IPv4 for A, e.g. 192.0.2.1"></div>
          <div class="field-msg" id="msg-block-ipv4"></div>
          <div class="input-row" style="margin-bottom:2px"><input type="text" id="s-block-ipv6" placeholder="Custom IPv6 for AAAA, e.g. 100::1"></div>
          <div class="field-msg" id="msg-block-ipv6"></div>
        </div>
      </div>
      <div class="card fade-in" style="animation-delay:0.1s">
        <div class="card-title">Log Retention</div>
        <div class="input-row" style="margin-bottom:2px"><input type="text" id="s-retention" placeholder="7" style="max-width:80px"><span style="color:var(--text-dim);font-size:0.85rem">days</span></div>
        <div class="field-msg" id="msg-retention"></div>
      </div>
      <div class="card fade-in" style="animation-delay:0.12s">
        <div class="card-title">Public URL</div>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px">Used for Apple mobileconfig profiles. Must be HTTPS with a valid domain.</p>
        <div class="input-row" style="margin-bottom:2px"><input type="url" id="s-public-url" placeholder="https://dns.example.com"></div>
        <div class="field-msg" id="msg-public-url"></div>
      </div>
      <div class="fade-in" style="animation-delay:0.15s;min-height:18px;margin-top:4px">
        <span style="color:var(--text-dim);font-size:0.8rem">Changes are saved automatically.</span>
      </div>
      <div class="card fade-in" style="animation-delay:0.2s;margin-top:24px">
        <div class="card-title">DoH Access Control</div>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:12px">
          Default policy for unauthenticated DoH requests (without a token in URL).
        </p>
        <label class="field-label" for="s-doh-policy">Default Policy</label>
        <div class="input-row">
          <select id="s-doh-policy">
            <option value="allow">Allow (open access)</option>
            <option value="deny">Deny (require token)</option>
          </select>
        </div>
        <div class="field-msg" id="msg-doh-policy"></div>
        <div class="card-title" style="margin-top:16px">DoH Tokens</div>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:12px">
          Each token becomes a DoH URL path: <code style="color:var(--accent);font-size:0.8rem">/dns-query/your-token</code>. Always works regardless of policy.
        </p>
        <div class="input-row">
          <input type="text" id="token-value" placeholder="e.g. my-phone, home-network">
          <button class="btn btn-primary btn-sm" id="add-token">${icons.plus} Add</button>
        </div>
        <div id="doh-tokens-list"></div>
      </div>`;

    this.load();

    this.renderUpstreams = async () => {
      const el = this.querySelector('#upstream-health');
      try {
        const rows = await api.get('/api/upstream/health');
        const transport = s => s.startsWith('tls://') ? ['dot','var(--accent)'] : s.startsWith('https://') ? ['doh','var(--accent)'] : ['plain','var(--orange)'];
        el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px"><span class="card-title" style="margin-bottom:0">Active upstreams</span><button class="btn btn-sm" id="refresh-upstream">${icons.refresh} Recheck</button></div>
          <div class="table-wrap"><table><thead><tr><th>Server</th><th>Transport</th><th>Health</th><th>Latency</th></tr></thead><tbody>` +
          rows.map(r => { const [t,c] = transport(r.server); return `<tr>
            <td class="mono">${esc(r.server)}</td>
            <td><span class="badge" style="color:${c}">${t}</span></td>
            <td><span class="st ${r.ok ? 'st-ok' : 'st-block'}">${r.ok ? '✔' : '✖'}</span></td>
            <td class="mono">${r.ok ? esc(String(r.latency_ms)) + 'ms' : '—'}</td></tr>`; }).join('') +
          `</tbody></table></div>`;
        const rb = el.querySelector('#refresh-upstream');
        if (rb) rb.onclick = () => this.renderUpstreams();
      } catch (e) { el.innerHTML = '<p style="color:var(--red)">Failed to load upstreams</p>'; }
    };

    this.querySelector('#apply-upstream').onclick = async () => {
      const msg = this.querySelector('#upstream-apply-msg');
      try {
        const res = await fetch('/api/settings', { method:'PUT', headers:{'content-type':'application/json'}, body: JSON.stringify({ upstream_servers: this.querySelector('#s-upstream').value }) });
        if (!res.ok) { msg.style.color = 'var(--red)'; msg.textContent = res.status === 400 ? 'Invalid upstream entry — not applied' : 'Failed to apply'; return; }
        msg.style.color = 'var(--accent)'; msg.textContent = '✔ applied';
        await this.renderUpstreams();
        setTimeout(() => { msg.textContent = ''; }, 2500);
      } catch (e) { msg.style.color = 'var(--red)'; msg.textContent = 'Failed to apply'; }
    };

    // --- Unified auto-save: every control saves on change/blur and reports its
    // own result inline, right next to that field. Invalid values never PUT.
    const setMsg = (id, ok, msg) => {
      const el = this.querySelector(id);
      if (!el) return;
      el.style.color = ok ? 'var(--accent)' : 'var(--red)';
      el.textContent = msg ? (ok ? '✔ ' : '✗ ') + msg : '';
      if (el._t) clearTimeout(el._t);
      if (ok && msg) el._t = setTimeout(() => { el.textContent = ''; }, 2000);
    };
    const putField = async (id, payload, okMsg) => {
      try {
        await api.put('/api/settings', payload);
        setMsg(id, true, okMsg);
      } catch (e) {
        setMsg(id, false, 'Save failed');
      }
    };
    const isIpv4 = (s) =>
      /^(25[0-5]|2[0-4]\d|1?\d?\d)(\.(25[0-5]|2[0-4]\d|1?\d?\d)){3}$/.test(s);
    const isIpv6 = (s) => { try { new URL('http://[' + s + ']/'); return true; } catch (e) { return false; } };

    this.querySelector('#s-doh-policy').onchange = (e) =>
      putField('#msg-doh-policy', { doh_access_policy: e.target.value }, 'Saved');

    this.querySelector('#s-strategy').onchange = (e) => {
      putField('#msg-strategy', { upstream_strategy: e.target.value }, 'Saved');
      this.loadEma();
    };

    this.querySelector('#s-dnssec').onchange = (e) =>
      putField('#msg-dnssec', { dnssec_disabled: e.target.value === 'off' ? 'true' : 'false' }, 'Saved');

    this.querySelector('#s-retention').onchange = (e) => {
      const v = e.target.value.trim();
      // Blank clears the setting → the server falls back to its default retention.
      if (v !== '' && (!/^\d+$/.test(v) || parseInt(v, 10) < 1)) { setMsg('#msg-retention', false, 'Must be a positive integer'); return; }
      putField('#msg-retention', { log_retention_days: v }, v === '' ? 'Using default' : 'Saved');
    };

    this.querySelector('#s-public-url').onchange = (e) => {
      const v = e.target.value.trim();
      if (v !== '') {
        let ok = /^https:\/\//i.test(v);
        if (ok) { try { new URL(v); } catch (err) { ok = false; } }
        if (!ok) { setMsg('#msg-public-url', false, 'Must be a valid https:// URL'); return; }
      }
      putField('#msg-public-url', { public_url: v }, 'Saved');
    };

    const syncBlockCustom = () => {
      this.querySelector('#s-block-custom').style.display =
        this.querySelector('#s-block-mode').value === 'custom_ip' ? 'block' : 'none';
    };
    // Validate the custom IPs (errors shown next to the offending field) and
    // save; report success at `msgId` (the control the user just touched).
    // Non-custom modes ignore the IP fields: send mode only so a stale/partial
    // value in a hidden field can never trigger a backend 400.
    const saveBlock = (msgId) => {
      const mode = this.querySelector('#s-block-mode').value;
      if (mode !== 'custom_ip') { putField(msgId, { block_mode: mode }, 'Saved'); return; }
      const v4 = this.querySelector('#s-block-ipv4').value.trim();
      const v6 = this.querySelector('#s-block-ipv6').value.trim();
      if (v4 !== '' && !isIpv4(v4)) { setMsg('#msg-block-ipv4', false, 'Invalid IPv4'); return; }
      if (v6 !== '' && !isIpv6(v6)) { setMsg('#msg-block-ipv6', false, 'Invalid IPv6'); return; }
      setMsg('#msg-block-ipv4', true, ''); setMsg('#msg-block-ipv6', true, '');
      putField(msgId, { block_mode: mode, block_custom_ipv4: v4, block_custom_ipv6: v6 }, 'Saved');
    };
    this.querySelector('#s-block-mode').onchange = () => { syncBlockCustom(); saveBlock('#msg-block-mode'); };
    this.querySelector('#s-block-ipv4').onchange = () => saveBlock('#msg-block-ipv4');
    this.querySelector('#s-block-ipv6').onchange = () => saveBlock('#msg-block-ipv6');

    this.querySelector('#add-token').onclick = async () => {
      const token = this.querySelector('#token-value').value.trim();
      if (!token) return;
      if (token.includes('/')) { alert('Token cannot contain /'); return; }
      await api.post('/api/doh-tokens', { token });
      this.querySelector('#token-value').value = '';
      this.loadTokens();
    };
    this.querySelector('#token-value').onkeydown = (e) => { if (e.key === 'Enter') this.querySelector('#add-token').click(); };
  }

  async load() {
    try {
      const [s, info] = await Promise.all([
        api.get('/api/settings'),
        api.get('/api/server-info'),
      ]);
      if (s.upstream_servers) this.querySelector('#s-upstream').value = s.upstream_servers.replace(/,\s*/g, '\n');
      this.renderUpstreams();
      if (s.public_url) this.querySelector('#s-public-url').value = s.public_url;
      if (s.log_retention_days) this.querySelector('#s-retention').value = s.log_retention_days;
      this.querySelector('#s-doh-policy').value = s.doh_access_policy || 'allow';
      this.querySelector('#s-strategy').value = s.upstream_strategy || 'sequential';
      this.querySelector('#s-dnssec').value = (s.dnssec_disabled === 'true') ? 'off' : 'on';
      this.querySelector('#s-block-mode').value = s.block_mode || 'null_ip';
      if (s.block_custom_ipv4) this.querySelector('#s-block-ipv4').value = s.block_custom_ipv4;
      if (s.block_custom_ipv6) this.querySelector('#s-block-ipv6').value = s.block_custom_ipv6;
      this.querySelector('#s-block-custom').style.display =
        (s.block_mode === 'custom_ip') ? 'block' : 'none';
      this.loadEma();
      if (info) {
        const tls = info.tls_enabled ? '<span class="badge badge-allowed">TLS</span>' : '<span class="badge badge-off">Plain</span>';
        this.querySelector('#server-info').innerHTML = `
          <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 16px">
            <span style="color:var(--text-dim)">DNS</span><span class="mono">${esc(info.dns_addr)}</span>
            <span style="color:var(--text-dim)">HTTP</span><span><span class="mono">${esc(info.http_addr)}</span> ${tls}</span>
          </div>`;
      }
    } catch (e) { console.error(e); }
    this.loadTokens();
  }

  async loadTokens() {
    try {
      const tokens = await api.get('/api/doh-tokens');
      const el = this.querySelector('#doh-tokens-list');
      if (!tokens || !tokens.length) {
        el.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem">No tokens configured</p>';
        return;
      }
      let html = '<div class="table-wrap"><table><thead><tr><th>Token</th><th>DoH URL</th><th></th></tr></thead><tbody>';
      for (const t of tokens) {
        html += `<tr>
          <td class="mono" style="color:var(--text-primary)">${esc(t.token)}</td>
          <td><code class="mono" style="color:var(--text-dim);font-size:0.75rem">/dns-query/${esc(t.token)}</code></td>
          <td style="white-space:nowrap"><a class="btn btn-sm" href="/api/mobileconfig/${esc(t.token)}" download style="text-decoration:none;margin-right:4px">Apple Profile</a><button class="btn btn-danger btn-sm del-token" data-id="${t.id}">${icons.trash} Delete</button></td>
        </tr>`;
      }
      html += '</tbody></table></div>';
      el.innerHTML = html;
      el.querySelectorAll('.del-token').forEach(btn => {
        btn.onclick = async () => {
          if (confirm('Delete this token? Clients using it will lose DoH access.')) {
            await api.del(`/api/doh-tokens/${btn.dataset.id}`);
            this.loadTokens();
          }
        };
      });
    } catch (e) { console.error(e); }
  }

  async loadEma() {
    const el = this.querySelector('#ema-latency');
    const strategy = this.querySelector('#s-strategy').value;
    if (strategy !== 'lowest-latency') {
      el.innerHTML = '';
      return;
    }
    try {
      const data = await api.get('/api/upstream/latency');
      if (!data || !data.length) {
        el.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem">No latency data yet. Data will appear after queries are processed.</p>';
        return;
      }
      let html = '<div class="table-wrap"><table><thead><tr><th>Server</th><th>EMA Latency</th><th></th></tr></thead><tbody>';
      for (const d of data) {
        const badge = d.preferred ? ' <span class="badge badge-allowed">preferred</span>' : '';
        html += `<tr><td class="mono">${esc(d.server)}</td><td class="mono">${d.ema_ms.toFixed(1)}ms</td><td>${badge}</td></tr>`;
      }
      html += '</tbody></table></div>';
      el.innerHTML = html;
    } catch (e) {
      el.innerHTML = '';
    }
  }
}
customElements.define('settings-page', SettingsPage);

// ============================================================
// App Bootstrap
// ============================================================
const app = document.getElementById('app');
let shell = null;
const router = new AppRouter();

function showSetup() {
  app.innerHTML = '';
  const setup = document.createElement('setup-page');
  app.appendChild(setup);
}

function showLogin() {
  app.innerHTML = '';
  const login = document.createElement('login-page');
  app.appendChild(login);
}

function showApp() {
  app.innerHTML = '';
  shell = document.createElement('app-shell');
  app.appendChild(shell);
  router.start();
}

function setPage(tag) {
  if (!shell) return;
  const container = shell.pageContent;
  container.innerHTML = '';
  const page = document.createElement(tag);
  container.appendChild(page);
}

router
  .on('#dashboard', () => setPage('dashboard-page'))
  .on('#stats', () => setPage('stats-page'))
  .on('#logs', () => setPage('logs-page'))
  .on('#filters', () => setPage('filters-page'))
  .on('#settings', () => setPage('settings-page'))
  .on('#account', () => setPage('account-page'));

window.addEventListener('auth-required', showLogin);
window.addEventListener('login-success', showApp);

// Bootstrap: check health for setup status, then check auth
async function bootstrap() {
  try {
    const health = await api.get('/api/health');
    window.__noadd_version = health.version || '';
    if (health.needs_setup) {
      showSetup();
      return;
    }
    // Password is set — check if already authenticated
    await api.get('/api/settings');
    showApp();
  } catch (e) {
    showLogin();
  }
}

bootstrap();
</script>
</body>
</html>
