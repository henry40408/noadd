# cargo-deny configuration — supply-chain checks for the dependency graph.
# Run locally with `cargo deny check`; CI runs the same on every push and PR.

[graph]
# Check the dependency graph for all targets, not just the host's, so a
# platform-specific dependency can't smuggle in a bad license or advisory.
all-features = true

[advisories]
version = 2
# Deny crates with a known security advisory (RUSTSEC) or that have been yanked.
# `ignore` holds advisory IDs we've reviewed and consciously accept.
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained (repo archived). Still pulled in
    # transitively; no drop-in replacement wired up yet, low risk.
    "RUSTSEC-2025-0134",
    # quick-xml <0.41 DoS pair: unbounded namespace-declaration allocation
    # (RUSTSEC-2026-0195) and quadratic duplicate-attribute scan
    # (RUSTSEC-2026-0194). Both are reachable only through `NsReader` parsing
    # untrusted XML. noadd's sole plist use is `plist::to_writer_xml`
    # (serialization) in src/admin/api.rs — it never parses XML, so the
    # vulnerable paths are unreachable. Pulled in via plist 1.9.0, which pins
    # quick-xml ^0.39. Remove once we upgrade to plist >=1.10.0 (requires
    # quick-xml ^0.41); tracked in the follow-up issue.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Permissive / public-domain-equivalent licenses only. Verify the active set
# with `cargo deny list`; add a license here only after reviewing the crate.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Duplicate transitive versions are common; surface them as a warning, not a
# hard failure.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io is trusted; an unknown registry or any git source is rejected.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
